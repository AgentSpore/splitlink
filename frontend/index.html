<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SplitLink — Split payments made simple</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7', 400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857', 800: '#065f46', 900: '#064e3b' }
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center gap-3">
      <span class="text-2xl font-extrabold text-brand-600 tracking-tight">SplitLink</span>
      <span class="text-sm text-gray-400 hidden sm:inline">· split payments made simple</span>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-6 space-y-6">

    <!-- Verdict banner -->
    <div id="verdict-banner" class="hidden border rounded-lg px-4 py-3 text-sm font-medium transition-all" role="alert"></div>

    <!-- Create form -->
    <section class="bg-white rounded-xl border border-gray-200 p-5">
      <h2 class="text-lg font-bold text-gray-800 mb-3">New Split Link</h2>
      <form id="create-form" class="space-y-3">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div>
            <label for="title" class="block text-sm font-medium text-gray-600 mb-1">Title *</label>
            <input id="title" type="text" required placeholder="e.g. Tokyo trip" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
          </div>
          <div>
            <label for="url" class="block text-sm font-medium text-gray-600 mb-1">URL *</label>
            <input id="url" type="url" required placeholder="https://share.example.com/..." class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
          </div>
        </div>
        <div>
          <label for="description" class="block text-sm font-medium text-gray-600 mb-1">Description</label>
          <textarea id="description" rows="2" placeholder="What's this split for?" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500"></textarea>
        </div>
        <button id="create-btn" type="submit" class="w-full sm:w-auto bg-brand-600 hover:bg-brand-700 text-white font-medium py-2 px-6 rounded-lg transition-colors text-sm">Create Link</button>
      </form>
    </section>

    <!-- Search + controls -->
    <div class="flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between">
      <div class="relative w-full sm:w-72">
        <input id="search-input" type="text" placeholder="Search links…" class="w-full rounded-lg border border-gray-300 pl-9 pr-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
        <svg class="absolute left-3 top-2.5 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      </div>
      <span id="stats-overview" class="text-xs text-gray-400"></span>
    </div>

    <!-- Links list -->
    <section id="links-section">
      <div id="links-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
      <!-- Pagination -->
      <div id="pagination" class="mt-4 flex items-center justify-center gap-2"></div>
    </section>
  </main>

  <!-- Detail modal -->
  <div id="detail-modal" class="fixed inset-0 bg-black/40 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl max-w-lg w-full p-6 relative">
      <button onclick="closeModal()" class="absolute top-3 right-3 text-gray-400 hover:text-gray-600 transition-colors text-2xl leading-none">&times;</button>
      <h3 id="modal-title" class="text-xl font-bold text-gray-900 mb-3"></h3>
      <div id="modal-body"></div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    const LIMIT = 10;
    let currentPage = 0;
    let searchTimer = null;

    // --- API helpers ---
    async function api(path, opts = {}) {
      const res = await fetch(`${API_BASE}${path}`, {
        headers: { 'Content-Type': 'application/json' },
        ...opts,
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(err.detail || `HTTP ${res.status}`);
      }
      return res.status === 204 ? null : res.json();
    }

    // --- Verdict banner ---
    function showVerdict(msg, type = 'success') {
      const banner = document.getElementById('verdict-banner');
      const colors = { success: 'bg-green-50 border-green-200 text-green-800', error: 'bg-red-50 border-red-200 text-red-800', info: 'bg-blue-50 border-blue-200 text-blue-800' };
      banner.className = `border rounded-lg px-4 py-3 text-sm font-medium transition-all ${colors[type] || colors.info}`;
      banner.textContent = msg;
      banner.classList.remove('hidden');
      setTimeout(() => banner.classList.add('hidden'), 4000);
    }

    // --- Skeleton loading ---
    function renderSkeletons(count = 3) {
      const el = document.getElementById('links-list');
      el.innerHTML = Array.from({ length: count }, () =>
        `<div class="bg-white rounded-xl border border-gray-200 p-4 animate-pulse space-y-2"><div class="h-4 bg-gray-200 rounded w-3/4"></div><div class="h-3 bg-gray-100 rounded w-1/2"></div><div class="h-3 bg-gray-100 rounded w-2/3"></div></div>`
      ).join('');
    }

    // --- Create Link ---
    document.getElementById('create-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('create-btn');
      btn.disabled = true; btn.textContent = 'Creating...';
      try {
        const title = document.getElementById('title').value.trim();
        const url = document.getElementById('url').value.trim();
        const description = document.getElementById('description').value.trim() || null;
        const link = await api('/links', { method: 'POST', body: JSON.stringify({ title, url, description }) });
        showVerdict(`Link "${link.title}" created!`, 'success');
        document.getElementById('create-form').reset();
        currentPage = 0;
        await loadLinks();
      } catch (err) {
        showVerdict(err.message, 'error');
      } finally {
        btn.disabled = false; btn.textContent = 'Create Link';
      }
    });

    // --- Record Click ---
    async function recordClick(id) {
      try {
        const result = await api(`/links/${id}/click`, { method: 'POST' });
        showVerdict('Click recorded!', 'info');
        await loadLinks();
      } catch (err) {
        showVerdict(err.message, 'error');
      }
    }

    // --- Record Settlement ---
    async function recordSettlement(id) {
      const amount = prompt('Enter settlement amount:');
      if (!amount) return;
      const num = parseFloat(amount);
      if (isNaN(num) || num <= 0) { showVerdict('Amount must be > 0', 'error'); return; }
      try {
        const result = await api(`/links/${id}/settlement`, { method: 'POST', body: JSON.stringify({ amount: num }) });
        showVerdict(`Settlement of $${num.toFixed(2)} recorded!`, 'success');
        await loadLinks();
      } catch (err) {
        showVerdict(err.message, 'error');
      }
    }

    // --- Delete Link (closes modal after deletion) ---
    async function deleteLink(id) {
      if (!confirm('Delete this link?')) return;
      try {
        await api(`/links/${id}`, { method: 'DELETE' });
        showVerdict('Link deleted', 'info');
        closeModal();
        await loadLinks();
      } catch (err) {
        showVerdict(err.message, 'error');
      }
    }

    // --- Show Details (Modal) ---
    async function showDetails(id) {
      try {
        const link = await api(`/links/${id}`);
        // link includes analytics inline — no second call needed
        const a = link.analytics;
        document.getElementById('modal-title').textContent = link.title;
        document.getElementById('modal-body').innerHTML = `
          <div class="space-y-3">
            <div><span class="text-sm font-medium text-gray-500">URL:</span> <a href="${link.url}" target="_blank" class="text-brand-600 text-sm break-all hover:underline">${link.url}</a></div>
            <div><span class="text-sm font-medium text-gray-500">Description:</span> <span class="text-sm text-gray-700">${link.description || '—'}</span></div>
            <div><span class="text-sm font-medium text-gray-500">Created:</span> <span class="text-sm text-gray-700">${new Date(link.created_at).toLocaleString()}</span></div>
            <hr class="my-2">
            <h4 class="font-semibold text-gray-700">Analytics</h4>
            <div class="grid grid-cols-3 gap-3 mt-2">
              <div class="stat-card text-center"><p class="text-2xl font-bold text-brand-600">${a.total_clicks}</p><p class="text-xs text-gray-500">Clicks</p></div>
              <div class="stat-card text-center"><p class="text-2xl font-bold text-blue-600">${(a.open_rate * 100).toFixed(1)}%</p><p class="text-xs text-gray-500">Open Rate</p></div>
              <div class="stat-card text-center"><p class="text-2xl font-bold text-amber-600">$${a.average_settlement.toFixed(2)}</p><p class="text-xs text-gray-500">Avg Settlement</p></div>
            </div>
            <div class="flex gap-2 mt-4">
              <button onclick="recordClick(${link.id})" class="flex-1 bg-brand-100 hover:bg-brand-200 text-brand-700 py-2 rounded-lg text-sm font-medium transition-colors">+ Click</button>
              <button onclick="recordSettlement(${link.id})" class="flex-1 bg-amber-100 hover:bg-amber-200 text-amber-700 py-2 rounded-lg text-sm font-medium transition-colors">+ Settlement</button>
              <button onclick="deleteLink(${link.id})" class="flex-1 bg-red-100 hover:bg-red-200 text-red-700 py-2 rounded-lg text-sm font-medium transition-colors">Delete</button>
            </div>
          </div>
        `;
        document.getElementById('detail-modal').classList.remove('hidden');
      } catch (err) {
        showVerdict(err.message, 'error');
      }
    }

    function closeModal() {
      document.getElementById('detail-modal').classList.add('hidden');
    }
    document.getElementById('detail-modal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal();
    });

    // --- Render link card ---
    function renderLinkCard(link) {
      const a = link.analytics || {};
      return `
        <div class="bg-white rounded-xl border border-gray-200 p-4 card-hover cursor-pointer" onclick="showDetails(${link.id})">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0 flex-1">
              <h3 class="font-semibold text-gray-900 truncate">${escapeHtml(link.title)}</h3>
              <p class="text-sm text-gray-500 truncate mt-0.5">${escapeHtml(link.url)}</p>
              ${link.description ? `<p class="text-sm text-gray-400 mt-1 truncate">${escapeHtml(link.description)}</p>` : ''}
              <p class="text-xs text-gray-400 mt-1">${new Date(link.created_at).toLocaleDateString()}</p>
            </div>
            <div class="flex flex-col items-end gap-1 shrink-0">
              <span class="text-xs font-semibold text-brand-600 bg-brand-50 px-2 py-0.5 rounded-full">${a.total_clicks || 0} clicks</span>
              <span class="text-xs text-gray-400">${((a.open_rate || 0) * 100).toFixed(0)}% open</span>
            </div>
          </div>
          <div class="flex gap-2 mt-3">
            <button onclick="event.stopPropagation(); showDetails(${link.id})" class="text-xs bg-brand-50 hover:bg-brand-100 text-brand-700 py-1 px-3 rounded-lg font-medium transition-colors">Details</button>
            <button onclick="event.stopPropagation(); recordClick(${link.id})" class="text-xs bg-brand-50 hover:bg-brand-100 text-brand-700 py-1 px-3 rounded-lg font-medium transition-colors">+ Click</button>
            <button onclick="event.stopPropagation(); recordSettlement(${link.id})" class="text-xs bg-amber-50 hover:bg-amber-100 text-amber-700 py-1 px-3 rounded-lg font-medium transition-colors">+ Settle</button>
          </div>
        </div>
      `;
    }

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    // --- Load links ---
    async function loadLinks() {
      renderSkeletons();
      try {
        const search = document.getElementById('search-input').value.trim();
        const params = new URLSearchParams({ limit: String(LIMIT), offset: String(currentPage * LIMIT) });
        if (search) params.set('search', search);
        const data = await api(`/links?${params}`);
        const total = data.total || 0;
        const links = data.items || [];

        if (links.length === 0) {
          document.getElementById('links-list').innerHTML = `<div class="col-span-full text-center py-12 text-gray-400"><p class="text-lg">No links yet</p><p class="text-sm mt-1">Create your first split link above</p></div>`;
        } else {
          document.getElementById('links-list').innerHTML = links.map(renderLinkCard).join('');
        }

        document.getElementById('total-count').textContent = String(total);
        renderStats(links);
        renderPagination(total);
      } catch (err) {
        document.getElementById('links-list').innerHTML = `<div class="col-span-full text-center py-12 text-red-400"><p>Failed to load links</p><p class="text-xs mt-1">${err.message}</p></div>`;
        showVerdict(err.message, 'error');
      }
    }

    // --- Stats ---
    function renderStats(links) {
      const el = document.getElementById('stats-overview');
      const totalClicks = links.reduce((s, l) => s + (l.analytics?.total_clicks || 0), 0);
      const avgSettlement = links.reduce((s, l) => s + (l.analytics?.average_settlement || 0), 0) / links.length || 0;
      const topLink = links.reduce((best, l) => ((l.analytics?.total_clicks || 0) > (best?.analytics?.total_clicks || 0) ? l : best), links[0] || {});
      el.textContent = `${links.length} links · ${totalClicks} total clicks · avg $${avgSettlement.toFixed(2)}${topLink.title ? ` · top: ${escapeHtml(topLink.title)}` : ''}`;
    }

    // --- Pagination ---
    function renderPagination(total) {
      const el = document.getElementById('pagination');
      const totalPages = Math.ceil(total / LIMIT);
      if (totalPages <= 1) { el.innerHTML = ''; return; }
      let html = '';
      for (let i = 0; i < totalPages; i++) {
        html += `<button onclick="goPage(${i})" class="px-3 py-1 text-sm rounded-lg border ${i === currentPage ? 'bg-brand-600 text-white border-brand-600' : 'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'}">${i + 1}</button>`;
      }
      el.innerHTML = html;
    }

    function goPage(page) {
      currentPage = page;
      loadLinks();
    }

    // --- Search with debounce ---
    document.getElementById('search-input').addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        currentPage = 0;
        loadLinks();
      }, 300);
    });

    // --- Init ---
    document.addEventListener('DOMContentLoaded', () => {
      loadLinks();
    });
  </script>
</body>
</html>
